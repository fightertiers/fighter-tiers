<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fighter Tiers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<header>
  <h1>✈️ Fighter Tiers</h1>
  <p>Competitive Fighter Pilot Rankings</p>

  <input
    type="text"
    id="search"
    placeholder="Search Pilot"
  >

  <div class="filters">
    <button onclick="filterTier('all')">ALL</button>
    <button onclick="filterTier('lt5')">LT5</button>
    <button onclick="filterTier('ht5')">HT5</button>
    <button onclick="filterTier('lt4')">LT4</button>
    <button onclick="filterTier('ht4')">HT4</button>
    <button onclick="filterTier('lt3')">LT3</button>
    <button onclick="filterTier('ht3')">HT3</button>
    <button onclick="filterTier('lt2')">LT2</button>
    <button onclick="filterTier('ht2')">HT2</button>
    <button onclick="filterTier('lt1')">LT1</button>
    <button onclick="filterTier('ht1')">HT1</button>
  </div>
</header>

<section class="stats">
  <div class="stat-card">
    <h2 id="playerCount">0</h2>
    <p>Total Pilots</p>
  </div>

  <div class="stat-card">
    <h2 id="testerCount">0</h2>
    <p>Testers</p>
  </div>

  <div class="stat-card">
    <h2 id="topTier">HT1</h2>
    <p>Highest Tier</p>
  </div>
</section>

<section>
  <h2 class="section-title">🏆 Top Pilots</h2>
  <div id="leaderboard"></div>
</section>

<section>
  <h2 class="section-title">🛡️ Queue Status</h2>

  <div class="queue-box">
    <p id="queueStatus">Queue Closed</p>
  </div>
</section>

<div id="profileModal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeProfile()">&times;</span>

    <div id="profileContent"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
